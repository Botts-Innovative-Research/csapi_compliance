version: '3.8'
services:
  csapi-compliance:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - CSAPI_PORT=3000
    volumes:
      - results-data:/app/tmp/results
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  results-data:
