# Agentic Refactor Harness Configuration
# Project: OGC CS API Compliance Assessor
harness:
  max_retries_per_sprint: 3
  max_total_iterations: 15
  context_reset_strategy: "full"

  directories:
    handoffs: ".harness/handoffs/"
    contracts: ".harness/contracts/"
    evaluations: ".harness/evaluations/"
    prompts: ".harness/prompts/"

  # Build environment note: System Node is v12 (too old).
  # All npm/node commands must be prefixed with:
  #   export NVM_DIR="$HOME/.nvm" && [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
  build:
    nvm_prefix: 'export NVM_DIR="$HOME/.nvm" && [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"'
    test: "npx vitest run"
    lint: "npx eslint . --ext .ts,.tsx"
    typecheck: "npx tsc --noEmit"
    coverage: "npx vitest run --coverage"
    e2e: "npx playwright test"
    dev_server: "PORT=4000 CSAPI_PORT=4000 npm run dev"
    build: "npm run build"

  agents:
    discovery:
      model: "claude-sonnet-4-6"
      mode: "auto"
      effort: "medium"
      prompt: ".harness/prompts/discovery.md"
      tools: ["Read", "Grep", "Glob", "WebSearch", "WebFetch"]
      invocation: "conditional"
      max_turns: 20
      max_budget_usd: 2.00
      reads: ["_bmad/", "openspec/", "docs/"]
      writes: ["_bmad/product-brief.md", ".harness/handoffs/"]

    planner:
      model: "claude-sonnet-4-6"
      mode: "auto"
      effort: "medium"
      prompt: ".harness/prompts/planner.md"
      tools: ["Read", "Grep", "Glob", "Write"]
      invocation: "always"
      max_turns: 30
      max_budget_usd: 5.00
      reads: ["_bmad/", "openspec/", "epics/", ".harness/handoffs/"]
      writes: ["epics/", "openspec/change-proposals/"]

    architect:
      model: "claude-opus-4-6"
      mode: "auto"
      effort: "high"
      prompt: ".harness/prompts/architect.md"
      tools: ["Read", "Grep", "Glob", "Write"]
      invocation: "conditional"
      max_turns: 25
      max_budget_usd: 10.00
      reads: ["_bmad/", "openspec/"]
      writes: ["_bmad/architecture.md", "openspec/capabilities/*/design.md"]

    design:
      model: "claude-sonnet-4-6"
      mode: "auto"
      effort: "medium"
      prompt: ".harness/prompts/design.md"
      tools: ["Read", "Grep", "Glob", "Write"]
      invocation: "conditional"
      max_turns: 20
      max_budget_usd: 3.00
      reads: ["_bmad/", "openspec/", ".harness/evaluations/"]
      writes: ["_bmad/ux-spec.md"]

    generator:
      model: "claude-opus-4-6"
      mode: "auto"
      effort: "high"
      prompt: ".harness/prompts/generator.md"
      tools: ["Read", "Edit", "Write", "Grep", "Glob", "Bash"]
      invocation: "always"
      max_turns: 100
      max_budget_usd: 50.00
      max_session_duration: "2h"
      reads: ["openspec/", "epics/stories/", "_bmad/ux-spec.md", ".harness/contracts/", ".harness/handoffs/"]
      writes: ["src/", "tests/", "openspec/capabilities/*/spec.md", ".harness/handoffs/"]

    evaluator:
      model: "claude-opus-4-6"
      mode: "auto"
      effort: "high"
      prompt: ".harness/prompts/evaluator.md"
      tools: ["Read", "Grep", "Glob", "Bash"]
      invocation: "always"
      skepticism_level: "high"
      max_turns: 50
      max_budget_usd: 20.00
      reads: ["openspec/", "epics/stories/", "_bmad/ux-spec.md", ".harness/contracts/", "ops/e2e-test-plan.md", "src/"]
      writes: [".harness/evaluations/", "ops/test-results.md"]

  coverage:
    spec_coverage:
      req_implemented_must_be_tested: true
      scenario_pass_rate_threshold: 0.90
      critical_scenario_pass_rate: 1.00
    code_coverage:
      tool: "c8"
      minimum_line_coverage_new_files: 0.80
      minimum_branch_coverage_new_files: 0.70
      no_regression: true
      report_path: "coverage/"
      fail_sprint_on_violation: true

  evaluation_criteria:
    - name: "Spec Fidelity"
      weight: 0.25
      hard_fail: "spec contradicted without rationale"
    - name: "Functional Completeness"
      weight: 0.25
      hard_fail: "critical SCENARIO-* fails"
    - name: "Integration Correctness"
      weight: 0.20
      hard_fail: "E2E test fails"
    - name: "Conformance Accuracy"
      weight: 0.10
      hard_fail: "false positive or false negative in conformance assertions"
      description: "Test assertions correctly identify conformant and non-conformant implementations"
    - name: "Code Quality"
      weight: 0.10
    - name: "Robustness"
      weight: 0.10
      hard_fail: "security vulnerability or data loss"

  # Conformance fixture testing — specific to compliance testing tools
  conformance_fixtures:
    known_good_servers:
      - name: "OGC GeoRobotix Testbed"
        url: "https://api.georobotix.io/ogc/t18/api"
        description: "OGC reference implementation (public testbed)"
    known_bad_fixtures:
      description: "To be built — parameterized mock server returning intentionally defective responses"
      path: "tests/fixtures/"
