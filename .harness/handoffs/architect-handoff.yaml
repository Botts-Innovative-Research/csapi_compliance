surfaced_risks:
  - id: "GENERATOR-EMPIRICAL-DEDUPE-LIST-DERIVATION"
    severity: medium
    description: |
      ADR-009 Sprint 3 amendment provides an illustrative jar exclusion table
      but EXPLICITLY mandates empirical derivation. Risk: Generator may treat
      the illustrative table as authoritative and skip the comm-comparison step,
      shipping a jar set that doesn't match the actual Maven dep tree at
      Sprint 3 implementation time. Symptom: image size doesn't reach 450MB OR
      removes a jar that breaks 12/12 PASS.
    mitigation: |
      Captured in constraints_for_generator.must (item 11) and must_not (item 5).
      Acceptance criterion in S-ETS-03-04 should require archiving the empirical
      enumeration BEFORE the Dockerfile edit (sequencing: enumerate → archive →
      edit). Quinn verifies the archive matches the Dockerfile exclusion list at
      gate review.

  - id: "MASKING-REQUEST-LOGGING-FILTER-RESPONSE-LOGGING"
    severity: low
    description: |
      design.md §wrap pattern's MaskingRequestLoggingFilter overrides
      RequestLoggingFilter (request-side). REST-Assured also has
      ResponseLoggingFilter (response-side). If the Sprint 2 baseline registered
      both Request + Response logging filters, only the request side is being
      hardened in Sprint 3. The response side could leak Set-Cookie or
      Authorization-bounce headers.
    mitigation: |
      Generator should grep SuiteFixtureListener.java for any
      ResponseLoggingFilter registration. If present, the same wrap pattern
      applies — extend ResponseLoggingFilter into MaskingResponseLoggingFilter
      with the same try/finally pattern (mirror image; ~30 LOC). If not present,
      no action. This finding is captured here as a Sprint 3 close audit item;
      Generator notes in Implementation Notes whether ResponseLoggingFilter
      exists in the Sprint 2 baseline.

  - id: "STUB-SERVER-PORT-COLLISION-IN-CI"
    severity: low
    description: |
      ADR-010 §Risks notes the stub-server may collide with port 5000 (or
      whatever Generator picks) on GitHub Actions runners. Mitigation in ADR
      (ephemeral port via socket.bind(('', 0))) is correct but adds Generator
      complexity vs hardcoded port.
    mitigation: |
      Hardcoded port + retry-on-collision is acceptable as a simpler fallback
      if ephemeral-port is fragile. Generator picks pragmatically; document
      in Implementation Notes. CI failure of dependency-skip job due to port
      collision is recoverable (workflow re-run) and rare.

architectural_decisions_resolved:
  - id: "DEPENDENCY-SKIP-APPROACH"
    question: "Pat's option (a), (b), or (c)?"
    resolution: |
      Option (c) BOTH. Bash sabotage canonical (CITE-SC-grade end-to-end);
      TestNG unit test fast-feedback structural lint. Stub-server sabotage
      preferred over testng.xml mutation. Defense-in-depth role split per
      ADR-010. Worktree-pollution constraint embedded.
  - id: "REST-ASSURED-LOGGING-FILTER-WRAP-PATTERN"
    question: "Pat's option (a) subclass, (b) chained-filter, or (c) full-replacement?"
    resolution: |
      Option (a) subclass. MaskingRequestLoggingFilter extends RequestLoggingFilter;
      try/finally header swap pattern (originals restored before HTTP request
      reaches IUT). Per design.md §"Sprint 3 hardening: MaskingRequestLoggingFilter
      wrap pattern". Rejected (b) (fragile to filter-order changes) and (c)
      (overkill — re-implements 200+ LOC of formatting).
  - id: "IMAGE-SIZE-OPTIMIZATION-APPROACH"
    question: "Pat's option (a) deps-closure dedupe, (b) distroless, or (c) alpine?"
    resolution: |
      Option (a) TE common-libs ↔ deps-closure dedupe. Per ADR-009 Sprint 3
      amendment (in-place; not a new ADR — it's a continuation of the original
      ADR-009 §Negative bullet 4 deferral). Empirical exclusion list mandated;
      illustrative table is not authoritative. Rejected (b) distroless
      (Sprint 5+) and (c) alpine (50-100MB savings insufficient + musl risk).

surfaced_questions_resolved:
  - id: "REST-ASSURED-WRAP-ADR-OR-DESIGN-MD"
    question: "Should REST-Assured RequestLoggingFilter wrap warrant its own ADR or just design.md §529 amendment?"
    resolution: |
      design.md amendment (NOT a new ADR). Justification: (a) wrap uses well-
      trodden REST-Assured public Filter SPI; (b) masking semantics already in
      CredentialMaskingFilter.maskValue() from Sprint 2; (c) wrap is 30-50 LOC
      subclass — decision surface too small per the Sprint 2 §14.5
      NO-ADR-for-CredentialMaskingFilter precedent; (d) audit weight carried by
      NFR-ETS-08 + SCENARIO-ETS-CLEANUP-LOGBACK-MASKING-001 + the now-mandated
      credential-leak integration test. ADR-010 §Notes cross-references the
      design.md section to maintain traceability.

