risks_for_generator:
  highest:
    - id: "URI-CANONICALIZATION-BREAKS-SMOKE"
      severity: high
      description: |
        S-ETS-02-03 changes 30-40 URI strings across spec.md + traceability.md + Java
        @Test descriptions. If the OGC canonical form differs from what we ASSUME for any
        single URI, the @Test description carries a wrong URI but the assertion logic
        still passes — silent regression of audit-trail integrity. (Inherited from Pat's
        planner-handoff; Architect concurs.)
      mitigation: |
        Mapping-table-first methodology mandated by Acceptance Criterion #1. Generator MUST
        curl-verify each .adoc URL returns HTTP 200 BEFORE the sweep. Quinn verifies the
        table during gate review. Spot-check 3 random URIs after the sweep.

    - id: "ETSASSERT-REFACTOR-BREAKS-12-12-PASS"
      severity: high
      description: |
        S-ETS-02-02 mechanically refactors 21 bare-throw sites. If a helper invocation
        accidentally swaps operands in an OR check (assertJsonArrayContainsAnyOf with
        wrong predicate ordering), or unifies assertions that should remain separate,
        the 12/12 PASS smoke regresses silently — the test still PASSES but for the
        wrong reason. (Inherited from Pat; Architect adds: ADR-008's per-helper unit
        tests are the primary mitigation.)
      mitigation: |
        VerifyETSAssert.java unit tests cover both PASS and FAIL paths for each helper.
        Refactor + test in lockstep: the helper passes its own unit test BEFORE any bare-
        throw site is migrated to use it. Smoke between each test-class commit (3 commits
        total). Generator MUST NOT batch all 21 site migrations into a single commit.

  medium:
    - id: "DOCKERFILE-MULTISTAGE-BREAKS-SMOKE"
      severity: medium
      description: |
        S-ETS-02-05 rewrites the Dockerfile. Build artifacts and runtime layout may shift
        in ways that break the smoke pipeline. Raze s03's adversarial sabotage test
        confirmed smoke catches assertion failures cleanly; it does NOT confirm a
        Dockerfile change is automatically caught.
      mitigation: |
        ADR-009 specifies the Dockerfile in executable detail (both stages, layer order,
        USER rules, smoke-test.sh simplification). Generator follows it verbatim. Run
        smoke END-TO-END on a clean tempdir (no ~/.m2 mount) BEFORE committing the
        Dockerfile change.

    - id: "SYSTEMFEATURES-GEOROBOTIX-EMPTY-COLLECTION"
      severity: medium
      description: |
        Sprint 2 assumes GeoRobotix's /systems is non-empty. If GeoRobotix has changed,
        the 4 @Tests may legitimately PASS-by-vacuity in misleading ways.
      mitigation: |
        Acceptance Criterion #1 mandates curl /systems FIRST and archive the response
        shape into Implementation Notes. If empty/404, PIVOT to /conf/common (REQ-ETS-PART1-001)
        as the Sprint 2 new feature class with rationale captured in generator-handoff.

    - id: "GH-WORKFLOW-SCOPE-STILL-MISSING"
      severity: medium
      description: |
        S-ETS-02-05 sub-task C requires gh token with 'workflow' scope. Same scope was
        missing across S-ETS-01-01..03. (Inherited from Pat.)
      mitigation: |
        User-action item: orchestrator runs `gh auth refresh -s workflow` at sprint start.
        If still blocked, S-ETS-02-05 closes with workflow file under ci/ and explicit
        deferral note; success_criterion ci_workflow_live converges to Sprint 3+ carryover.

    - id: "SCOPE-CONFLICT-INSIDE-CONFORMANCE-CORE-RACE"
      severity: medium
      description: |
        S-ETS-02-02 (EtsAssert refactor) and S-ETS-02-03 (URI canonicalization) BOTH
        touch the same 3 files: conformance/core/{LandingPageTests,ConformanceTests,
        ResourceShapeTests}.java. If Generator runs them in parallel (or out of strict
        sequence), the second story's commits will conflict with the first's. Pat marked
        both as 'parallelizable: false' but did not explicitly call out the cross-story
        file-level race.
      mitigation: |
        Sequential ordering is mandatory. The natural order is S-ETS-02-02 FIRST (extend
        ETSAssert; refactor 21 sites to call helpers — touches the bodies of every @Test
        method), then S-ETS-02-03 (update REQ_* constants — touches the static final
        String declarations at the top of each file). Doing it in this order means
        S-ETS-02-03's commit is a 4-12 line constant-update diff per file (clean),
        whereas the reverse order would mean S-ETS-02-02's helper-migration commit
        rewrites every test method body AGAIN with the now-canonical URI strings — git
        diff noise + Quinn-bisectability hurt.

  low:
    - id: "REPRODUCIBLE-BUILD-AFTER-MULTISTAGE"
      severity: low
      description: |
        S-ETS-02-05 changes the Dockerfile but the Maven build stage produces the same
        target/*.jar artifacts. The reproducible-build sha256 should hold (per ADR-009
        §Consequences). If it doesn't, the cause is likely a BuildKit cache layer that
        captured an interim Maven plugin pin — not a true reproducibility regression
        but visually alarming.
      mitigation: |
        Sprint 2 success_criterion reproducible_build remains true. Verify with two
        consecutive fresh-clone builds + sha256sum diff. Document any divergence in
        ops/test-results/ with explanatory note.

    - id: "ADR-009-BUILDKIT-FALLBACK"
      severity: low
      description: |
        ADR-009's --mount=type=cache requires Docker BuildKit. Some older CI environments
        (Docker < 19.03) don't have BuildKit. If GitHub Actions runner ever defaults to
        a non-BuildKit Docker, the cache mount silently no-ops and cold builds become
        slow but still correct.
      mitigation: |
        ops/server.md should record DOCKER_BUILDKIT=1 as the canonical env var.
        scripts/smoke-test.sh should set it explicitly. GitHub Actions modern runners
        have BuildKit on by default; this is forward-defensive only.

architectural_decisions_resolved:
  - id: "ADR-006-CONTENT"
    question: "What goes in ADR-006 for Jersey 1.x → Jakarta EE 9 / Jersey 3.x port?"
    resolution: |
      Written. Covers 6 Sprint 1 commits, references features10@java17Tomcat10TeamEngine6
      branch as port pattern, lists 5 alternatives considered (stay on Jersey 1.x +
      explicit dep — rejected; rewrite via JDK 11 HttpClient — rejected; skip + leave
      unused — rejected; wait for archetype 3.x — rejected). ADR-004 amended via Group F
      cross-reference.
  - id: "ADR-007-CONTENT"
    question: "What goes in ADR-007 for Dockerfile base image deviation?"
    resolution: |
      Written. Empirical evidence table reproduces Quinn s03 + Raze s03 verification
      commands. 5 alternatives considered (build TE 5.6.1 from source — rejected; use
      :latest with custom JRE 17 layer — rejected; fork production image with JDK 17 —
      rejected for our scope, correct long-term answer; pin :1.0-SNAPSHOT — rejected;
      backport ETS to JDK 8 — rejected). 3 secondary patches each individually
      documented with empirical root-cause. ADR-001 amended with cross-reference.
  - id: "ETSASSERT-API-SURFACE"
    question: "Single helper, family of helpers, or builder-style? Specific signatures?"
    resolution: |
      Family of 5 type-specific static helpers (per ADR-008): assertStatus,
      assertJsonObjectHas, assertJsonArrayContains, assertJsonArrayContainsAnyOf,
      failWithUri. Pat proposed 4; Architect added assertJsonArrayContainsAnyOf because
      the OR-fallback pattern (service-desc OR service-doc) appears in Sprint 1's
      LandingPageTests and would otherwise need failWithUri (defeating the centralization).
      Builder-style and single-mega-helper rejected per ADR-008 §Alternatives.
  - id: "MULTI-STAGE-DOCKERFILE-PATTERN"
    question: "Pat option (a), (b), or (c)?"
    resolution: |
      Option (a): eclipse-temurin:17-jdk-jammy build stage with Maven 3.9.9 + BuildKit
      --mount=type=cache,target=/root/.m2; tomcat:8.5-jre17 runtime stage preserves
      ADR-007's 3 secondary patches; non-root USER tomcat. Most reproducible across host
      environments; CI cold-cache cost amortized via BuildKit; aligns with features10
      java17 branch direction. Per ADR-009 with executable Dockerfile snippets.
  - id: "SYSTEMFEATURES-COVERAGE-SCOPE"
    question: "Sprint-1-style minimal-then-expand vs full-coverage day 1?"
    resolution: |
      Sprint-1-style minimal-then-expand. 4 @Test methods at Sprint 2 close (one per
      Pat-enumerated SCENARIO); Sprint 3 expansion roadmap captured in design.md
      §SystemFeatures coverage scope rationale (canonical URL, location-time, collections,
      pagination, ~4 more for filter interactions). Pat's recommendation accepted; Architect
      reasoning at design.md (4 bullets: pattern-extension risk control, foundational
      shape coverage, beta-gate doesn't require full per-class depth, GeoRobotix /systems
      shape unknown until curl-verified).

surfaced_questions_resolved:
  - id: "CREDENTIAL-MASKING-FILTER-ADR"
    question: "Should CredentialMaskingFilter (S-ETS-02-04) warrant its own ADR?"
    resolution: |
      No separate ADR. Rules captured inline in design.md §"CredentialMaskingFilter
      wiring (Sprint 2 S-ETS-02-04)" and architecture.md §14.5. Justification: the
      implementation is wire-the-OGC-pattern-verbatim (REST-Assured Filter SPI is
      well-trodden; logback config is 5 lines; v1.0 credential-masker.ts provides the
      semantics verbatim). NFR-ETS-08 + SCENARIO-ETS-CLEANUP-LOGBACK-MASKING-001 carry
      the audit weight. Decision surface too small for an ADR.
  - id: "ADR-001-CROSS-REFERENCE-AMENDMENT"
    question: "Amend ADR-001 (option i lightweight footnote) vs ADR-001v2 (option ii) vs leave unchanged (option iii)?"
    resolution: |
      Option (i): lightweight footnote in ADR-001 §Consequences "Positive" bullet 2
      cross-referencing ADR-007. Architect applied the edit directly to
      ADR-001-teamengine-spi-registration.md (the change is committed at this turn).
      Generator's S-ETS-02-01 work just verifies the amendment landed; no additional
      Generator action needed beyond commit-the-existing-edit. Rejected option (ii)
      (ADR-001v2 supersede) because ADR-001's SPI mechanics are correct; only the
      production-image-without-modification parenthetical was wrong. Rejected option
      (iii) (rely on ADR-007's supersedes line alone) because a reader of ADR-001 who
      doesn't know ADR-007 exists won't find the correction.

surfaced_risks_pat_missed:
  - id: "SCOPE-CONFLICT-INSIDE-CONFORMANCE-CORE-RACE"
    severity: medium
    description: |
      S-ETS-02-02 (EtsAssert refactor) and S-ETS-02-03 (URI canonicalization) BOTH touch
      conformance/core/{LandingPageTests,ConformanceTests,ResourceShapeTests}.java. Pat
      marked them parallelizable: false at the story level but did not call out the
      cross-story file-level race. If Generator interleaves them, the second story's
      commits will conflict with the first's, AND running them in the wrong order
      doubles the diff size of the second story.
    action: |
      Captured in `risks_for_generator.medium.SCOPE-CONFLICT-INSIDE-CONFORMANCE-CORE-RACE`
      with mitigation (sequential ordering S-ETS-02-02 → S-ETS-02-03 mandatory; the
      reverse order kills git-diff cleanliness). Sam: no Sprint 2 contract change needed;
      Generator follows the dependency_order in Pat's handoff which already implies this
      sequence. Optionally add a note to S-ETS-02-03 file's "Dependencies" section: "Order
      AFTER S-ETS-02-02 to keep the sweep diff clean."

  - id: "EtsAssert-EVOLUTION-CAP"
    severity: low
    description: |
      ADR-008 specifies 5 helpers; design.md §"ADR Cross-References" notes that at
      Sprint 5+ if helper count exceeds ~12, consider splitting into ETSAssert (XML
      legacy) + RestAssertions (new). This deferral is captured but Pat's contract
      doesn't track it as an explicit Sprint 5+ planning input.
    action: |
      Sam: at Sprint 5 planning cycle, if SystemFeatures + Subsystems + Procedures +
      Sampling have shipped without needing helpers beyond the current 5, no action.
      If new shapes emerge (e.g. CRUD assertion patterns for write-operation classes),
      revisit and either grow ETSAssert or split. Tracked here so the option doesn't
      get forgotten.

  - id: "REPRO-BUILD-DOUBLE-VERIFICATION-AT-SPRINT-CLOSE"
    severity: low
    description: |
      Sprint 2 success_criteria includes reproducible_build: true (carryover from Sprint
      1). With ADR-009's multi-stage Dockerfile changing the build process, a re-verify
      at Sprint 2 close is wise — the same-host Maven build still produces the same
      jars (no Dockerfile influence on Maven), but a CITE SC reviewer running `docker
      build` twice should also see byte-identical container layer SHAs. Pat's contract
      doesn't track the docker-image reproducibility separately.
    action: |
      Sam: at Sprint 2 close, run two consecutive `docker build .` invocations on the
      same commit and compare the final image SHA. If divergent, root-cause and document
      in ops/known-issues.md. Container-layer reproducibility is harder than jar-byte
      reproducibility (timestamps in /etc/passwd, etc.) — accept some divergence with
      explanation if it's annotation-only.

