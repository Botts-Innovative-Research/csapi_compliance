    + (+) Direct evidence from ets-ogcapi-features10@master grounds ADR-001 verbatim — the SPI
          pattern is not theoretical; it is a copy-paste port.
    + (+) ets-common pom.xml inspection confirmed dep versions, parent semantics, TE version pin.
    + (+) Concrete classes named and contracts specified (LandingPageTests, ConformanceTests,
