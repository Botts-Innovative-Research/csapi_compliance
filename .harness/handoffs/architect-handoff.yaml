adrs:
  - id: "ADR-006"
    title: "Jersey 1.x → Jakarta EE 9 / Jersey 3.x Port (Archetype Util Layer)"
    decision: |
      Port the 8 archetype-supplied util-layer source files + verification test from
      com.sun.jersey.* / javax.ws.rs.* to org.glassfish.jersey.* / jakarta.ws.rs.*
      using features10@java17Tomcat10TeamEngine6 as the reference branch. 6 atomic
      commits cited retroactively. ADR-004 amended with Group F cross-ref.
  - id: "ADR-007"
    title: "Dockerfile Base Image Deviation: tomcat:8.5-jre17 + Manual TE 5.6.1 Assembly"
    decision: |
      FROM tomcat:8.5-jre17 (not ogccite/teamengine-production:5.6.1 — tag absent +
      JDK 8). Assemble TE 5.6.1 via Maven Central artifacts (teamengine-web,
      teamengine-web-common-libs, teamengine-console-base) + 3 patches
      (VirtualWebappLoader strip, JAXB shared-lib, deps closure with TE 6.0.0
      filter). Identical 12/12 PASS to what the directed image would have produced.
      Supersedes ADR-001 §Consequences "production image loads without modification"
      sentence.
  - id: "ADR-008"
    title: "EtsAssert REST/JSON Helper API Surface"
    decision: |
      5 new static helpers in ETSAssert: assertStatus(Response, int, String),
      assertJsonObjectHas(Map, String, Class, String), assertJsonArrayContains(List,
      Predicate, String, String), assertJsonArrayContainsAnyOf(List,
      List<Map.Entry<String, Predicate>>, String), failWithUri(String, String). All
      raise AssertionError with /req/* URI prefix. Per-helper unit tests mandated.
      Sprint 2+ binding constraint: zero throw new AssertionError in conformance.*.
  - id: "ADR-009"
    title: "Multi-Stage Dockerfile Pattern"
    decision: |
      Pat option (a): Stage 1 = eclipse-temurin:17-jdk-jammy + Maven 3.9.9 + BuildKit
      --mount=type=cache,target=/root/.m2; Stage 2 = tomcat:8.5-jre17 + ADR-007's 3
      patches + non-root USER tomcat. Layer order optimized for cache (pom.xml +
      go-offline before src; rare-changing layers before per-commit). Image target
      ≤ 450MB. scripts/smoke-test.sh drops host-mvn deps. Eliminates Quinn s03 +
      Raze s03 host-~/.m2 brittleness.

