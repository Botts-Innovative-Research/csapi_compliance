deviations:
  - description: "S-ETS-02-05 image size: 815MB image / 663MB smoke vs ADR-009 soft target ≤450MB"
    rationale: "ADR-009 §Negative explicitly notes 450MB is soft target with Sprint 3 deferral acceptable. Root cause is tomcat:8.5-jre17 base + 96 deps closure + TE common-libs duplication. Sprint 3 optimization candidates: distroless runtime stage (rejected for Sprint 2 in ADR-009 §Alternatives) or TE common-libs ↔ deps-closure dedupe."
    spec_updated: true
  - description: "S-ETS-02-05 sub-task C CI workflow `git mv` BLOCKED by missing gh `workflow` token scope"
    rationale: "gh auth status confirms scopes are gist, read:org, repo only. Generator attempted git mv + commit + push; push rejected with HTTP 403. Generator REVERTED the move locally to keep main pushable; workflow file remains at ci/github-workflows-build.yml. User-action item: `gh auth refresh -s workflow`, then redo the git mv + push."
    spec_updated: true
  - description: "S-ETS-02-04 credential-leak integration test deferred to Sprint 3+"
    rationale: "Suite does not yet wire an `auth-credential` CTL parameter; the unit test layer (VerifyCredentialMaskingFilter, 15 tests) fully verifies the load-bearing semantic (literal credential-middle MUST NOT appear in masked output)."
    spec_updated: true
  - description: "S-ETS-02-05 Dockerfile builder stage: Maven download URL switched from dlcdn.apache.org to archive.apache.org"
    rationale: "dlcdn.apache.org rotates and Maven 3.9.9 was 404 as of 2026-04-28; archive.apache.org keeps every release indefinitely. Build reproducibility preserved per ADR-009 §Risks base-image-cadence note."
    spec_updated: false
  - description: "S-ETS-02-05 Dockerfile builder stage: git installed + COPY .git into context"
    rationale: "buildnumber-maven-plugin (configured in pom.xml) needs git for SCM revision metadata; without it, mvn package fails. Adds ~10MB to builder image (discarded after build); .dockerignore added to exclude target/ etc. from build context."
    spec_updated: false
  - description: "S-ETS-02-05 Dockerfile COPY pattern: only the slim ets jar (NOT wildcard *.jar)"
    rationale: "The wildcard pattern initially used (`ets-ogcapi-connectedsystems10-*.jar`) matched -aio.jar / -javadoc.jar / -site.jar in addition to the slim main jar. The aio jar shades transitive deps that conflict with the loose lib-runtime closure also dropped under WEB-INF/lib (caught during multi-stage smoke verification: TestSuiteController init failed with `ApplicationComponents could not be instantiated`). Tightened the COPY pattern to the explicit `ets-ogcapi-connectedsystems10-0.1-SNAPSHOT.jar` filename per the Sprint 1 single-stage pattern."
    spec_updated: false

