deviations_from_pat_contract:
  - description: |
      Pat's planning narrative referenced /conf/subdeployments (plural) as the conformance class
      identifier and /req/subdeployment/parent-deployment-link as a possible parent-link sub-
      requirement. Generator HTTP-200-verified at OGC source: directory is subdeployment/ (singular,
      5 .adoc files); class identifier in requirements_class_subdeployments.adoc is /req/subdeployment
      (singular); declares inherit:: /req/deployment (so canonical-endpoint, canonical-url, resources-
      endpoint are INHERITED from /req/deployment). There is NO /req/subdeployment/parent-deployment-
      link sub-requirement; subdeployments do not have the equivalent of Subsystems' parent-system-
      link uniqueness — the inheritance from /req/deployment is the architectural composition
      mechanism. IUT also declares /conf/subdeployment (singular) per Generator curl 2026-04-30T20:24Z.
      Generator implementation uses singular consistently and the 4 @Tests use the inherited canonical
      URIs from /req/deployment for canonical-endpoint + canonical-url; the Subdeployments-specific
      URI is /req/subdeployment/collection (collection presence) plus the /req/subdeployment class URI
      (3-deep cascade runtime tracer).
    spec_updated_to_match: true  # REQ-005 narrative records the priority correction
  - description: |
      Wedge 5 first attempt used a literal `--target=systemfeatures` CLI flag inside an XML comment
      in pom.xml. XML 1.0 §2.5 forbids `--` (double-dash) inside comment content; Maven POM parser
      rejected with "Non-parseable POM /build/pom.xml: in comment after two dashes (--) next
      character must be > not t". Fix: rewrote comment to reference flag without literal double-dash.
      Spec/contract did not anticipate this XML edge case — Generator's adaptation preserved the
      formatter version pinning rationale without reintroducing the parsing error.
    spec_updated_to_match: false  # comment-only edit; no spec changes required
  - description: |
      Wedge 6 first attempt used maven:3.9-eclipse-temurin-17-alpine as the wrapper image. Alpine
      maven image lacks git in the base layer; pom uses buildnumber-maven-plugin which shells out
      to git for SCM revision metadata; build failed with "Cannot run program git". Fix: switched
      to maven:3.9-eclipse-temurin-17 (Debian-based; git pre-installed). spec/contract did not
      anticipate this dependency on Git in the wrapper image — Generator's adaptation documented
      in script comments to prevent reintroduction.
    spec_updated_to_match: false  # script comment-only documentation; no spec changes required

