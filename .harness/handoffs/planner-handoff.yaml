resolved_open_questions:
  - id: "PART2-DOC-NUMBER"
    question: "Brief uses OGC 23-002, connected-systems-go cites IS 24-008. Which is current?"
    resolution: "OGC 23-002 is authoritative. Confirmed via docs.ogc.org/is/23-002/23-002.html (approved 2025-06-02, published 2025-07-16, status Approved). Confirmed via docs.ogc.org/is/24-008/24-008.html returning HTTP 404. The connected-systems-go README's IS 24-008 string is incorrect; their CS API Part 2 implementation references the wrong document number."
    citation: "https://docs.ogc.org/is/23-002/23-002.html (verified 2026-04-27)"
  - id: "CI-CD-TOPOLOGY"
    question: "Jenkinsfile (OGC convention) or GitHub Actions (our setup)?"
    resolution: "Both. GH Actions for our active CI (build, test, smoke). Jenkinsfile checked in as a stub mirroring ets-ogcapi-features10's Jenkinsfile for OGC submission compatibility — not wired to a live Jenkins instance. Architect to ratify the exact stub content."
  - id: "MAVEN-CENTRAL-PUBLISH-TIMING"
    question: "When do we publish to OSSRH/Maven Central?"
    resolution: "Beta milestone only. Pre-beta sprints publish SNAPSHOTs to OSSRH staging only. Avoids polluting Maven Central with pre-beta noise. Captured as REQ-ETS-CITE-001."
  - id: "TEST-DATA-LAYOUT"
    question: "Where do test fixtures and sample SensorML/SWE Common payloads live?"
    resolution: "src/main/resources/data/ for shipped sample data (mirroring ets-ogcapi-features10), src/test/resources/fixtures/spec-traps/ for the ported spec-trap corpus. Architect to confirm during ADR."

