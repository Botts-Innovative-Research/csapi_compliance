    severity: high
    description: "TeamEngine 5.5 testng-essentials docs defer SPI registration details to a Part 2 page that is not yet linked. If the SPI registration pattern from ets-ogcapi-features10 is incompatible with TeamEngine 5.5's current API, S-ETS-01-03 cannot land."
    mitigation: "Architect must validate the SPI pattern works against the actual TeamEngine 5.5 Docker image before Generator starts code. ADR captures the pattern and any deviations."
  - id: "ARCHETYPE-DATED"
    severity: medium
    description: "ets-archetype-testng:2.7 is from 2019. JDK 17 + 2026-vintage transitive dependencies may collide with archetype defaults."
    mitigation: "Budget 30-50% of S-ETS-01-01 for archetype modernization; ADR each delta."
