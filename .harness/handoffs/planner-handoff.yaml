surfaced_risks:
  # Pat noticed during Sprint 2 planning
  - id: "URI-CANONICALIZATION-BREAKS-SMOKE"
    severity: high
    description: |
      S-ETS-02-03 changes 30-40 URI strings across spec.md + traceability.md + Java
      @Test descriptions. If the OGC canonical form differs from what we ASSUME for any
      single URI (e.g. /conformance might be `/req/core/conformance-success` not
      `/req/conformance/conformance-success`), the @Test description carries a wrong URI
      but the assertion logic still passes — silent regression of audit-trail integrity.
    mitigation: |
      Generator MUST fetch the actual OGC `.adoc` source for each URI (not assume the
      pattern). Build a verified-canonical mapping table BEFORE the sweep. Quinn verifies
      the table during gate review.

  - id: "ETSASSERT-REFACTOR-BREAKS-12-12-PASS"
    severity: high
    description: |
      S-ETS-02-02 mechanically refactors 21 bare-throw sites to ETSAssert helpers. If
      helper signatures diverge from architect's ratified API surface, or if the refactor
      accidentally changes assertion semantics (e.g. swapping operands in an OR check),
      the 12/12 PASS smoke could regress.
    mitigation: |
      Refactor + test in lockstep: each helper method gets a unit test BEFORE the
      bare-throw sites are migrated. After every test class migration, re-run smoke. One
      commit per test class for Quinn-bisectability.

  - id: "DOCKERFILE-MULTISTAGE-BREAKS-SMOKE"
    severity: medium
    description: |
      S-ETS-02-05 rewrites the Dockerfile to multi-stage. Build artifacts and runtime
      layout may shift in ways that break the smoke pipeline. Raze's adversarial sabotage
      test in s03 confirmed smoke-test.sh catches assertion failures cleanly; it does NOT
      confirm that a Dockerfile change is automatically caught.
    mitigation: |
      Generator MUST re-run smoke END-TO-END after the Dockerfile rewrite — exit 0 + 12/12
      PASS — BEFORE committing the Dockerfile change. Architect ratifies the multi-stage
      pattern so Generator doesn't ad-lib.

  - id: "GH-WORKFLOW-SCOPE-STILL-MISSING"
    severity: medium
    description: |
      S-ETS-02-05 includes the `git mv` of `ci/github-workflows-build.yml` to
      `.github/workflows/build.yml`. Requires gh token with `workflow` scope. Same scope
      was missing across S-ETS-01-01..03. If still missing at Sprint 2, the move-to-live
      cannot land in this sprint either.
    mitigation: |
      User-action item: orchestrator runs `gh auth refresh -s workflow` at sprint start.
      If still blocked, S-ETS-02-05 closes with workflow file under `ci/` and explicit
      deferral note; success_criterion `ci_workflow_live` converges to Sprint 3+ carryover.

  - id: "SYSTEMFEATURES-GEOROBOTIX-EMPTY-COLLECTION"
    severity: medium
    description: |
      Sprint 2 assumes GeoRobotix's /systems collection is non-empty (per v1.0 E2E
      history). If GeoRobotix has changed (e.g. /systems now empty or returns 404), some
      SystemFeatures @Tests may legitimately PASS-by-vacuity in misleading ways.
    mitigation: |
      Generator MUST `curl -sf https://api.georobotix.io/ogc/t18/api/systems | head` as
      first step of S-ETS-02-06; archive response shape into Implementation Notes BEFORE
      writing assertions. If empty/404, PIVOT to /conf/common (REQ-ETS-PART1-001) as the
      new feature class with rationale captured in generator-handoff.

  - id: "ADR-DOCS-NEED-CONTENT-PAT-CANT-RATIFY"
    severity: low
    description: |
      Pat (Planner) can identify ADR-006 + ADR-007 are NEEDED but cannot author the ADR
      text content (decision, alternatives) unilaterally — that's Architect domain.
      Sprint 2 needs an Architect cycle BEFORE Generator can land S-ETS-02-01.
    mitigation: |
      next_agent: architect (this handoff). If Architect ratifies the ADR templates +
      EtsAssert API + Dockerfile multi-stage + SystemFeatures coverage scope quickly
      (1 cycle, low complexity since empirical evidence is captured in Quinn s03 + Raze
      s03 reports), Generator can then proceed with all 6 stories.

