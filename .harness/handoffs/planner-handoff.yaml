surfaced_risks:
  - id: "TWO-LEVEL-DEPENDENCY-CASCADE-MAY-NOT-WORK"
    severity: "high"
    description: "TestNG's group-dependency mechanism may NOT cascade transitively — when SystemFeatures FAILs, Subsystems may report status='FAIL' or 'ERROR' rather than 'SKIP'. Mitigation: Generator MUST verify two-level cascade BEFORE claiming Subsystems complete (extended bash sabotage exec OR VerifyTestNGSuiteDependency unit test extension). If FAILs instead of SKIPs, Architect cycle to BeforeSuite SkipException pattern."
  - id: "CHOWN-LAYER-ATTACK-MAY-NOT-MATERIALIZE-EXPECTED-SAVINGS"
    severity: "medium"
    description: "Docker buildkit `--chown` may still create a 30-50MB layer (not 0MB) due to filesystem attribute changes; cache invalidation may trigger upstream layer rebuilds offsetting savings. Mitigation: Generator baselines BEFORE attack, applies, measures; PARTIAL acceptable at 600-650MB; tier-2 version-overlap dedupe if needed."
  - id: "USER-ACTION-CI-WORKFLOW-5TH-SPRINT-DEFER"
    severity: "medium"
    description: "S-ETS-04-01 binary close depends on user running `gh auth refresh -s workflow`. If user CANNOT or DOES NOT do this, Path B formal-drop activates — `ci_workflow_live` permanently removed from sprint cadence. This is the BINARY close — no more 4-sprint-style retries."
  - id: "GEOROBOTIX-SUBSYSTEMS-SHAPE-MISMATCH"
    severity: "medium"
    description: "GeoRobotix may return 404 on `/systems/{id}/subsystems` (may not implement Subsystems at all). Mitigation: Generator MUST curl-verify BEFORE writing assertions; narrow scope or SKIP-with-reason if 404."
  - id: "QUINN-RAZE-GATE-VERIFICATION-TIME-BUDGET"
    severity: "low"
    description: "Sprint 4 has 5 stories — comparable scope to Sprint 3 but more intricate (two-level cascade + chown materialization + E2E auth flow). Mitigation: gate runs scoped ≤30 min each via NO docker pull/build/run loops; ONE smoke run + curl + mvn test only; worktree-pollution constraint preserved."
  - id: "ADR-CARDINALITY-DRIFT"
    severity: "low"
    description: "Sprint 1 had 5 ADRs. Sprint 2 added 4 (006-009). Sprint 3 added 1 (010 dependency-skip dual-pattern). Sprint 4 may add 0-1 more (ADR-009 v2 amendment in-place, OR ADR-011 superseding). At ADR-011+ level, Architect should consider an ADR-INDEX.md navigation aid."

