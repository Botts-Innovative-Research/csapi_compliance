strategic_decisions:
  q1_wedge_only_or_wedge_plus_class:
    question: "Wedge-only Sprint 8, or wedge + 1 new conformance class?"
    decision: "wedge-plus-1-class"
    rationale: |
      Sprint 7 wedge bundle is ~30-60 LOC (smaller than Sprint 7's 50-80 LOC wedge bundle).
      Subdeployments is a clean mechanical extension of Deployments (pure Java, zero new bash scripts).
      The new-feature meta-pattern risk that caused Sprint 5's 0.82/0.74 dip does NOT apply here
      — it was triggered by bash scripts not stress-tested under failure modes, not by new Java classes.
      Continuing to defer Subdeployments adds technical debt without quality benefit.
    alternatives_considered:
      wedge_only:
        rejected_because: "Sprint 7 wedge bundle is smaller than Sprint 6's, leaving capacity for 1 new class."
      wedge_plus_class:
        chosen: true

  q2_which_new_class:
    question: "Which new conformance class?"
    decision: "subdeployments"
    rationale: |
      Strongest dependency-cascade extension story: completes 3-deep chain
      (Subdeployments→Deployments→SystemFeatures→Core). Deployments parent is IMPLEMENTED (Sprint 5).
      More compelling than: GeoJSON (isolated/smallest scope), CRUD/Update (write-side risk),
      AdvancedFiltering (cross-cutting complexity), SensorML (specialized encoding).
      Creates NEW cascade proof point (Deployments-sabotage → Subdeployments-SKIP) beyond
      Sprint 7's SystemFeatures-sabotage cascade.
    alternatives_rejected:
      - geojson: "Isolated, smallest scope — no cascade story"
      - crud_update: "Write-side risk; no precedent in ETS"
      - advanced_filtering: "Cross-cutting; structural complexity"
      - sensorml: "Specialized encoding; limited GeoRobotix coverage"

  q3_gate_independence_forbid_list:
    question: "Add explicit 'neither gate reads the other's YAML' forbid-list to contract?"
    decision: "yes"
    rationale: |
      Sprint 7 meta-Raze META-GAP S7-2 identified STRONG_PARTIAL independence (not FULL).
      Both gates must write their YAML BEFORE reading the other's.
      Contract now contains gate_independence_no_peek criterion requiring quinn_peek_attempted: false
      and raze_peek_attempted: false attestation headers in each gate's YAML.
      Enforced via parallel spawn + peer-audit at meta-Raze review time.
    contract_criterion: "success_criteria.gate_independence_no_peek: true"

  q4_generator_projectwide_grep_criterion:
    question: "Add 'Generator design.md self-audit must be project-wide grep' success criterion?"
    decision: "yes-and-sharpened"
    rationale: |
      Sprint 7 meta-Raze META-GAP S7-3: Generator did narrow section grep in S-ETS-07-01 Wedge 5.
      Raze had to do the broader project-wide audit at gate time (after initial close commit).
      Sharpened: Generator must archive grep output AT INITIAL CLOSE COMMIT TIME, not Self-Raze
      follow-up. Inverts Sprint 7's pattern. Both Quinn and Raze independently verify the grep
      archive exists before awarding PASS on this criterion.
    contract_criterion: "success_criteria.generator_design_md_adr_self_audit_projectwide: true"
    sharpening: "archive_at_initial_close_commit_not_self_raze_followup"

