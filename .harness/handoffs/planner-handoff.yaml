confidence_rationale: |
  High confidence (0.82) because:
    + (+) The user resolved all three of Mary's gating questions explicitly.
    + (+) The Part 2 doc-number question is resolved authoritatively (docs.ogc.org confirms 23-002).
    + (+) Reference ETSs (features10, processes10, edr10) provide a known-good template.
    + (+) The Sprint 1 vertical slice is the smallest possible end-to-end proof; if it lands, the
          pattern extends mechanically to the remaining 13 Part 1 classes.
    + (+) Spec-trap fixtures (the most valuable IP from v1.0) are explicitly captured as a port
          target with REQs and a CI-enforced diff script (REQ-ETS-FIXTURES-* + REQ-ETS-SYNC-001).
    - (-) TeamEngine SPI registration mechanics are not fully documented; risk of integration
          friction in S-ETS-01-03 is real and could derail the Sprint 1 capstone.
    - (-) JVM toolchain proficiency is the team's largest unknown.
    - (-) Architect has not yet ratified the four open architectural questions (SPI mechanics,
          schema bundling, package naming, modernization scope); my plan assumes their resolution
          but does not foreclose Architect's choices.
    - (-) The placeholder REQ-* shape for Part 1 classes 2..14 and all of Part 2 trades depth for
          breadth; per-class detail is necessary before each future sprint and could surface
          contradictions with the Sprint 1 design.

