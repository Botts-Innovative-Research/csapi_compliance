conformance_class_pick:
  picked: "Common (REQ-ETS-PART1-001) only — NOT Common+Subsystems pair"
  rationale: |
    Per Pat's contract description block:
    (i) Sprint 3 has 8 carryover items — doubling that with 2 new conformance
        classes risks gate fatigue (Sprint 2 systemfeatures gate-run timed
        out on the dependency-skip test; tight scope preserves Quinn 0.96
        / Raze 0.92 quality trend);
    (ii) Common is foundational and unlocks all 11 remaining Part 1 classes
         which inherit Common's base assertions — highest dependency-leverage
         of any single class;
    (iii) Subsystems depends on SystemFeatures (per OGC ATS) but the dependency
          wiring is now PROVEN via the SystemFeatures→Core link, so Subsystems
          can land cleanly in Sprint 4 with low risk;
    (iv) Common+Subsystems would also exercise the testng.xml multi-class
         consolidation strategy — but that exercise is better done in Sprint 4
         when 4 classes (Core+SystemFeatures+Common+Subsystems) needs the
         BeforeSuite SkipException pattern noted in design.md §"testng.xml
         single-block consolidation" Sprint 3+ migration path.

