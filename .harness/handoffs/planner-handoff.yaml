surfaced_risks:
  - id: "MASKING-FILTER-APPROACH-I-COMPLETENESS"
    severity: "high"
    description: |
      Bypassing super.filter() means Generator must reproduce the log output (at minimum
      the masked header form) directly. If the format is too sparse, Raze may flag it as
      architecturally incomplete. If Generator tries to fully reproduce RequestLoggingFilter's
      200+ LOC, implementation may grow large or fragile. Mitigation: minimal format first
      (header names + masked values + HTTP method + URL); expand only if gate flags it.
  - id: "CAPTURING-FILTER-CONTEXT-MOCK-RESPONSE"
    severity: "high"
    description: |
      VerifyWireRestoresOriginalCredential needs CapturingFilterContext to return a Response.
      If Mockito is not in pom.xml test scope, Generator must implement a stub Response inline.
      Mitigation: Generator reads pom.xml test deps; implements anonymous class Response stub
      if Mockito absent.
  - id: "SABOTAGE-GIT-TEMP-TREE-SIZE"
    severity: "medium"
    description: |
      Removing --exclude='.git/' causes rsync to copy .git into temp tree. If .git is >50MB,
      performance degrades. Mitigation: Generator checks .git size with du -sh before removing
      the exclude; uses Option B (explicit cp -a) if >50MB.

