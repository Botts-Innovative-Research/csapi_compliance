    severity: medium
    description: "Team's demonstrated proficiency is TypeScript. Maven + TestNG + REST Assured + Kaizen is new."
    mitigation: "Heavy reuse of ets-ogcapi-features10 patterns. Architect produces an idiomatic-Java cookbook in the architecture doc."

