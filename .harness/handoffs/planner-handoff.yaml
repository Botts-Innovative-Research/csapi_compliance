summary: |
  Translated the user's 2026-04-27 pivot (Next.js web app → Java/TestNG TeamEngine ETS) into a
  full planning artifact set. Drafted 32 REQ-ETS-* across the new capability
  `ets-ogcapi-connectedsystems` (8 sub-deliverables: scaffold, Core, Part 1, Part 2 placeholders,
  TeamEngine integration, fixtures, CITE submission, webapp freeze, sync), 12 SCENARIO-ETS-*
  (5 CRITICAL gating Sprint 1), 7 new ETS epics, 3 Sprint 1 story files, 1 Sprint 1 contract,
  and updated the PRD + project-brief + traceability. Marked all 8 v1.0 capability specs
  Frozen and all 9 v1.0 epics Closed (frontmatter edits only — no content deleted).

  Sprint 1 is the smallest possible end-to-end vertical slice: archetype scaffold + JDK 17
  modernization (S-ETS-01-01) + CS API Core conformance class (S-ETS-01-02) + TeamEngine 5.5
  Docker smoke test against GeoRobotix (S-ETS-01-03). Critical evaluation focus: did the Java
  port preserve the v1.0 GH#3 fix (rel=self example-only) and the API-definition fallback
  (service-desc OR service-doc)? Is the OpenAPI YAML pinned by SHA? Is the smoke test green
  end-to-end?

  Part 2 work is explicitly excluded from Sprint 1 per user gate. Part 2 placeholder REQ-* IDs
  (REQ-ETS-PART2-001..014) are in the spec for traceability but carry no implementation detail
  yet. Detailed per-class FRs/SCENARIOs for Part 2 will be drafted in a future planning cycle.

