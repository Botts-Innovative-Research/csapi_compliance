summary: |
  Sprint 2 contract authored as cleanup-plus-feature-expansion. **6 stories** (1 P0 cleanup
  for the URI canonicalization sweep that closes Sprint 1's inherited PARTIAL, 4 P1 cleanup
  for ADRs/EtsAssert/logback/Dockerfile, 1 P0 new feature for SystemFeatures). Total est
  Generator wall-clock 8-12h (vs Sprint 1's ~6h for 3 stories — Sprint 2 has doubled scope
  from cleanup work but the per-class new-feature effort should be ~50% the cost of Sprint 1's
  Core because the architectural pattern is now established).

  **Conformance class pick: SystemFeatures (REQ-ETS-PART1-002)**. Foundational because
  every CS API endpoint exposes /systems collections; GeoRobotix serves a non-empty /systems
  collection per v1.0 web-app E2E history; the dependency-skip SCENARIO already references
  SystemFeatures by name; spec-trap fixture group `asymmetric-feature-type/` already exists
  in v1.0 ready for epic-ets-06 port.

  **Cleanup organization rationale**: per-story (cleaner than bundling into a new
  epic-ets-08-sprint2-cleanup.md). ADR-006/007 + logback + Dockerfile fold semantically into
  epic-ets-04-teamengine-integration; EtsAssert + URI sweep + SystemFeatures fold into
  epic-ets-02-part1-classes. Each cleanup story has its own focused REQ-ETS-CLEANUP-* + dedicated
  SCENARIO; no cleanup work hides inside a feature story.

  **5 architectural decisions deferred to Architect** (next_agent: architect): ADR-006 content,
  ADR-007 content, EtsAssert helper API surface, multi-stage Dockerfile pattern, SystemFeatures
  coverage scope. Plus 2 surfaced questions: (a) whether CredentialMaskingFilter warrants its
  own ADR; (b) whether ADR-001 needs cross-reference amendment to ADR-007. Architect cycle
  expected to be quick (low complexity since empirical evidence is already captured in Quinn
  s03 + Raze s03 reports).

  **Sprint 1 contract closure**: closing S-ETS-02-03 (URI canonicalization sweep) flips
  Sprint 1's inherited `uri_mapping_fidelity_preserved` PARTIAL → PASS, completing the Sprint 1
  contract retroactively. All other Sprint 1 success_criteria are already PASS.

  **Sprint 2 contract gates**: gate_4_required: true (continuing rigor pattern). Each non-trivial
  refactor (EtsAssert, URI sweep, Dockerfile multi-stage, SystemFeatures pattern extension) is a
  risk category Quinn + Raze need to verify independently.

