next_agent_rationale: |
  Architect (Alex) MUST land before Generator (Dana) for 3 deferred decisions
  that gate Sprint 3 execution. Per Pat's contract `handoff_to_generator` block:

  1. **Live break-Core dependency-skip approach** (S-ETS-03-01) — Architect
     picks: (a) TestNG programmatic API + mocked Core failures (~30 LOC unit
     test, hermetic, fast); (b) bash sabotage script + Docker rebuild + smoke
     + restoration (~5 min once cache warm; touches Docker); (c) BOTH
     (defense-in-depth — unit test for fast feedback + bash for end-to-end
     behavioral verification). Pat recommends (c).

  2. **REST-Assured RequestLoggingFilter wrap pattern** (S-ETS-03-02) —
     Architect picks: (a) `MaskingRequestLoggingFilter extends
     RequestLoggingFilter` (subclass-based, robust); (b) chained-filter
     registration-order (fragile but minimal change); (c) replace entirely
     with custom logger (most invasive). Pat recommends (a) per public-API
     verification.

  3. **Image-size optimization approach** (S-ETS-03-04) — Architect picks
     from Quinn cleanup GAP-1 enumeration: (a) TE common-libs ↔ deps-closure
     dedupe (recommended; 200-300MB savings); (b) distroless runtime stage
     (deferred per ADR-009); (c) multi-stage refinement (alpine; ~50-100MB).
     Pat recommends (a).

  Plus 1 surfaced question: whether REST-Assured RequestLoggingFilter wrap
  warrants its own ADR (ADR-010) or just design.md §529 amendment. Pat's
  hypothesis: design.md amendment is sufficient given Sprint 2's
  NO-ADR-for-CredentialMaskingFilter precedent (architect ratified inline).

